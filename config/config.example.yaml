# iCloud Photo Downloader — Configuration File Template
# Rename to config.yaml and fill in the actual values

# === Required ===
apple_id: "user@example.com"        # iCloud Apple ID

# === Storage Paths ===
download_path: "/data/photos"       # Photo download directory
folder_structure: "YYYY/MM"         # YYYY/MM | YYYY-MM-DD | album | none

# === Sync Settings ===
download_interval: 86400            # Sync interval (seconds)
download_delay: 0                   # Delay between downloads (seconds), 0=no delay
retry_interval: 120                 # Wait time before retry (seconds)
retry_count: 3                      # Max retry count per file
file_permissions: "644"             # 644 | 600 | 640 | 660 | 664 | 666
directory_permissions: "755"
keep_unicode: true
set_exif_datetime: true
file_match_policy: "name"           # name | size | checksum
download_resolution: "unmodified"   # unmodified | high_res | compatible

# === Deletion Policy ===
delete_policy: "keep"               # keep | delete | trash
trash_days: 30
delete_after_download: false        # Move to Recently Deleted in iCloud after download
max_deletions_per_run: 100          # Max deletions per sync cycle, to avoid throttling

# === China Region Settings ===
icloud_china: false
auth_china: false

# === Cookies and Auth ===
notification_days: 7                # Notify N days before cookie expires
cookie_dir: "/config/cookies"       # Cookie persistence directory

# === Notification Configuration ===
notification:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    polling_interval: 5
  webhook:
    enabled: false
    url: ""
    method: "POST"
    headers: {}
  events:
    - start
    - complete
    - error
    - auth_expired
    - cookie_expiring
    - low_space
    - rate_limited
    - sync_paused
    - sync_resumed

# === Post-processing Pipeline ===
pipeline:
  steps: []

# === Advanced Settings ===
log_level: "info"
