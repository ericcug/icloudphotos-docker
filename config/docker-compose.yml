
services:
  icloudpd:
    build:
      context: ..
      dockerfile: config/Dockerfile
    container_name: icloudphotos
    restart: unless-stopped
    dns_opt:
      - ndots:2               # Reduce unnecessary search domain queries
    environment:
      - ICLOUD_PASSWORD=${ICLOUD_PASSWORD}      # Passed via environment variable, not written to file
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./config.yaml:/config/config.yaml:ro     # Configuration file, read-only
      - /path/to/photos:/data                    # Photo storage directory
      - icloud_cookies:/config/cookies           # Cookie persistence
    healthcheck:
      test: ["CMD", "/bin/bash", "/app/healthcheck.sh"]
      interval: 300s
      timeout: 30s
      retries: 3
      start_period: 60s

volumes:
  icloud_cookies:
